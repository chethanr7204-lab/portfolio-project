name: My First Pipeline
on
push
branches: [ "main" ]
jobs
build:
runs-on ubuntu-latest
steps
name: Get code
uses actions/checkout@v3
name: Install Python
uses: actions/setup-python@v4
with:
python-version: 3.10'
name: Install requirements
run:
pip install -r requirements.txt
name: Run program
run:
python app.py
